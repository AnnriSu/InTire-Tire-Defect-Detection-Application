<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InTire | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/profile.css">
</head>

<body>

<header class="site-header">
    <button onclick="window.history.back()" class="menu-toggle">
        <i class="fas fa-arrow-left"></i>
    </button>
    <div class="header-logo">
        <img src="assets/img/InTire.svg" alt="InTire" class="logo-img pt-3">
    </div>
    <div style="width:36px"></div>
</header>

<main class="profile-container">

    <!-- Hero Banner -->
    <div class="profile-hero">
        <div class="profile-hero-bg"></div>
        <div class="profile-avatar-wrap">
            <div class="profile-avatar">
                <span class="profile-initials" id="pfInitials">—</span>
            </div>
            <button class="avatar-edit-btn" title="Change photo">
                <i class="fas fa-camera"></i>
            </button>
        </div>
        <h2 class="profile-name" id="pfName">—</h2>
        <p class="profile-role">InTire Member</p>
    </div>

    <!-- Info Card -->
    <div class="profile-section-card">
        <p class="profile-section-label">Personal Information</p>

        <div class="profile-info-item">
            <div class="profile-info-icon">
                <i class="fas fa-envelope"></i>
            </div>
            <div class="profile-info-body">
                <span class="profile-info-label">Email Address</span>
                <span class="profile-info-value" id="pfEmail">—</span>
            </div>
        </div>

        <div class="profile-info-divider"></div>

        <div class="profile-info-item">
            <div class="profile-info-icon">
                <i class="fas fa-phone"></i>
            </div>
            <div class="profile-info-body">
                <span class="profile-info-label">Phone Number</span>
                <span class="profile-info-value" id="pfPhone">—</span>
            </div>
        </div>

        <div class="profile-info-divider"></div>

        <div class="profile-info-item">
            <div class="profile-info-icon">
                <i class="fas fa-location-dot"></i>
            </div>
            <div class="profile-info-body">
                <span class="profile-info-label">Address</span>
                <span class="profile-info-value">Philippines</span>
            </div>
        </div>
    </div>


    <!-- Logout -->
    <button class="profile-logout-btn" onclick="logout()">
        <i class="fas fa-right-from-bracket"></i> Log Out
    </button>

</main>

<footer class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='overview.html'">
        <i class="fas fa-home"></i><span>Home</span>
    </button>
    <button class="nav-item" onclick="window.location.href='notifications.html'">
        <i class="fas fa-bell"></i><span>Notifications</span>
    </button>
    <button class="nav-item" onclick="window.location.href='analytics.html'">
        <i class="fas fa-chart-bar"></i><span>Analytics</span>
    </button>
    <button class="nav-item" onclick="window.location.href='more.html'">
        <i class="fas fa-ellipsis-h"></i><span>More</span>
    </button>
</footer>

</footer>

<script>
    const API_BASE = "http://127.0.0.1:5000";

    function initialsFor(fname, lname) {
        const a = (fname || "").trim()[0] || "";
        const b = (lname || "").trim()[0] || "";
        const out = (a + b).toUpperCase();
        return out || "U";
    }

    async function loadProfile() {
        try {
            const res = await fetch(`${API_BASE}/me`, { credentials: "include" });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || !data.success) {
                // Not logged in → send to sign in
                window.location.href = "signIn.html";
                return;
            }

            if (data.isGuest) {
                document.getElementById("pfName").textContent = "Guest";
                document.getElementById("pfInitials").textContent = "G";
                document.getElementById("pfEmail").textContent = "—";
                document.getElementById("pfPhone").textContent = "—";
                return;
            }

            const fullName = [data.fname, data.mname, data.lname].filter(Boolean).join(" ");
            document.getElementById("pfName").textContent = fullName || "User";
            document.getElementById("pfInitials").textContent = initialsFor(data.fname, data.lname);
            document.getElementById("pfEmail").textContent = data.email || "—";
            document.getElementById("pfPhone").textContent = data.mobileNo || "—";
        } catch (e) {
            console.error(e);
        }
    }

    async function logout() {
        try {
            await fetch(`${API_BASE}/logout`, { method: "POST", credentials: "include" });
        } catch {}
        window.location.href = "index.html";
    }

    loadProfile();
</script>

</body>
</html>
