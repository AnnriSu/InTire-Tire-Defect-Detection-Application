<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InTire | Inspection History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/history.css">
    <style>
        /* ---- View Detail Sheet ---- */
        .detail-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 500;
            align-items: flex-end;
            justify-content: center;
        }
        .detail-overlay.open { display: flex; }

        .detail-sheet {
            background: #ffffff;
            border-radius: 28px 28px 0 0;
            padding: 20px 24px 40px;
            width: 100%;
            max-width: 600px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(60px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        .detail-handle {
            width: 44px;
            height: 5px;
            background: #e0e0e0;
            border-radius: 3px;
            margin: 0 auto 18px;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .detail-title {
            font-size: 1rem;
            font-weight: 800;
            color: #111;
        }

        .detail-date {
            font-size: 0.72rem;
            color: #999;
            margin-top: 3px;
        }

        .detail-close-btn {
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            color: #555;
            transition: background 0.2s;
        }
        .detail-close-btn:hover { background: #e0e0e0; }

        .detail-divider {
            height: 1px;
            background: #f0f0f0;
            margin-bottom: 16px;
        }

        /* Info row */
        .detail-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .detail-info-item {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 12px 14px;
        }

        .detail-info-label {
            font-size: 0.65rem;
            color: #aaa;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .detail-info-value {
            font-size: 0.85rem;
            font-weight: 700;
            color: #111;
        }

        /* Findings section */
        .detail-section-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #aaa;
            margin-bottom: 10px;
        }

        /* Defect photo */
        .defect-photo-wrap {
            background: #f8f8f8;
            border: 1px solid #f0f0f0;
            border-radius: 14px;
            padding: 10px;
            margin: 10px 0 14px;
        }

        .defect-photo {
            width: 100%;
            max-height: 220px;
            object-fit: contain;
            border-radius: 10px;
            display: none;
            background: #fff;
        }

        .defect-photo-hint {
            font-size: 0.72rem;
            color: #888;
            font-weight: 600;
            text-align: center;
            padding: 16px 8px;
        }

        .detail-finding {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid;
        }

        .detail-finding.warning {
            background: rgba(243, 156, 18, 0.07);
            border-color: rgba(243, 156, 18, 0.25);
        }

        .detail-finding.danger {
            background: rgba(231, 76, 60, 0.07);
            border-color: rgba(231, 76, 60, 0.25);
        }

        .detail-finding.safe {
            background: rgba(39, 174, 96, 0.07);
            border-color: rgba(39, 174, 96, 0.25);
        }

        .detail-finding-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .warning .detail-finding-icon { background: #f39c12; color: #fff; }
        .danger  .detail-finding-icon { background: #e74c3c; color: #fff; }
        .safe    .detail-finding-icon { background: #27ae60; color: #fff; }

        .detail-finding-name {
            font-size: 0.83rem;
            font-weight: 700;
            color: #111;
        }

        .detail-finding-desc {
            font-size: 0.7rem;
            color: #888;
            margin-top: 2px;
        }

        .detail-finding-conf {
            margin-left: auto;
            font-size: 0.75rem;
            font-weight: 800;
        }

        .warning .detail-finding-conf { color: #f39c12; }
        .danger  .detail-finding-conf { color: #e74c3c; }
        .safe    .detail-finding-conf { color: #27ae60; }

        /* Status badge */
        .detail-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f8f8;
            border-radius: 12px;
            padding: 12px 14px;
            margin-top: 14px;
        }

        .detail-status-label {
            font-size: 0.72rem;
            color: #888;
            font-weight: 600;
        }

        .detail-status-badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .badge-active   { background: rgba(231,76,60,0.12); color: #e74c3c; }
        .badge-resolved { background: rgba(39,174,96,0.12);  color: #27ae60; }
    </style>
</head>

<body>

    <header class="site-header">
        <button class="menu-toggle"><i class="fas fa-bars"></i></button>
        <div class="header-logo">
            <img src="assets/img/InTire.svg" alt="InTire" class="logo-img pt-3">
        </div>
    </header>

    <nav class="tab-nav">
        <div class="tab-slider"></div>
        <a href="overview.html" class="tab-link">Overview</a>
        <a href="history.html" class="tab-link active">History</a>
        <a href="tutorial.html" class="tab-link">Tutorial</a>
        <a href="recommendations.html" class="tab-link">Recommendations</a>
    </nav>

    <main class="dashboard-container">
        <div class="title-row">
            <div class="page-title">
                <h1>Inspection History</h1>
            </div>
            <div class="filter-wrapper">
                <button class="filter-btn" id="filterBtn">
                    <i class="fas fa-filter"></i> Filter
                </button>
                <div class="filter-dropdown" id="filterDropdown">
                    <div class="filter-group">
                        <label>Sort by Date</label>
                        <select id="sortOrder">
                            <option value="desc">Newest First</option>
                            <option value="asc">Oldest First</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Specific Date</label>
                        <input type="date" id="dateSelect">
                    </div>
                    <div class="btn-group">
                        <button class="apply-btn" id="applyBtn">Apply</button>
                        <button class="reset-btn" id="resetBtn">Reset</button>
                    </div>
                </div>
            </div>
        </div>

        <section class="list-wrapper" id="cardList">
            <!-- Cards are rendered from the database via /inspection-history -->
        </section>
    </main>

    <footer class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='overview.html'"><i
                class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item" onclick="window.location.href='notifications.html'"><i
                class="fas fa-bell"></i><span>Notifications</span></button>
        <button class="nav-item" onclick="window.location.href='analytics.html'"><i
                class="fas fa-chart-bar"></i><span>Analytics</span></button>
        <button class="nav-item" onclick="window.location.href='more.html'"><i
                class="fas fa-ellipsis-h"></i><span>More</span></button>
    </footer>

    <!-- ─── Detail Sheet ─── -->
    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-sheet">
            <div class="detail-handle"></div>
            <div class="detail-header">
                <div>
                    <div class="detail-title" id="detailTitle">—</div>
                    <div class="detail-date" id="detailDate">—</div>
                </div>
                <button class="detail-close-btn" onclick="closeDetail()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="detail-divider"></div>

            <div class="detail-info-grid">
                <div class="detail-info-item">
                    <div class="detail-info-label">Tire Position</div>
                    <div class="detail-info-value" id="detailPosition">—</div>
                </div>
                <div class="detail-info-item">
                    <div class="detail-info-label">Validity</div>
                    <div class="detail-info-value" id="detailValidity">—</div>
                </div>
                <div class="detail-info-item">
                    <div class="detail-info-label">DOT code</div>
                    <div class="detail-info-value" id="detaildot">—</div>
                </div>
                <div class="detail-info-item">
                    <div class="detail-info-label">Inspected By</div>
                    <div class="detail-info-value" id="detailUser">—</div>
                </div>
            </div>

            <div class="detail-section-title">Detected Issues</div>
            <div class="defect-photo-wrap" id="defectPhotoWrap">
                <img class="defect-photo" id="defectPhoto" alt="Defect photo">
                <div class="defect-photo-hint" id="defectPhotoHint">Tap an issue below to view its photo.</div>
            </div>
            <div id="detailFindings"></div>

            <div class="detail-status-row">
                <span class="detail-status-label">Inspection Status</span>
                <span class="detail-status-badge" id="detailStatus">—</span>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:5000";
        const state = {
            inspections: [],
            byId: new Map(),
            sortOrder: "desc",
            dateFilter: ""
        };

        function safeText(v, fallback = "—") {
            const s = (v ?? "").toString().trim();
            return s.length ? s : fallback;
        }

        function toISODate(dateStr) {
            const s = (dateStr ?? "").toString().trim();
            // Expecting yyyy-mm-dd from your form. If not, we best-effort parse.
            if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
            const d = new Date(s);
            if (Number.isNaN(d.getTime())) return "";
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, "0");
            const dd = String(d.getDate()).padStart(2, "0");
            return `${yyyy}-${mm}-${dd}`;
        }

        function formatCardDate(iso) {
            if (!iso) return "—";
            // Convert yyyy-mm-dd -> mm-dd-yyyy (matches your old UI)
            const [y, m, d] = iso.split("-");
            if (!y || !m || !d) return iso;
            return `${m}-${d}-${y}`;
        }

        function iconForDefect(name) {
            const map = {
                'Surface Crack': 'fa-icicles',
                'Bulge': 'fa-circle',
                'Worn Tread': 'fa-exclamation-triangle',
                'Puncture Hole': 'fa-circle-dot',
                'Puncture Object': 'fa-thumbtack',
                'No Damage Detected': 'fa-check-circle'
            };
            return map[name] || 'fa-exclamation-circle';
        }

        function findingStyle(defectType) {
            // Basic severity mapping for your defect types
            const danger = new Set(['Surface Crack', 'Puncture Hole', 'Puncture Object']);
            const warning = new Set(['Bulge', 'Worn Tread']);
            if (danger.has(defectType)) return 'danger';
            if (warning.has(defectType)) return 'warning';
            return 'safe';
        }

        function computeStatus(tires) {
            // If there are any detected defects, treat as active issue. Otherwise resolved.
            return (tires && tires.length) ? 'active' : 'resolved';
        }

        function normalizeImageSrc(imageData) {
            const s = (imageData ?? "").toString().trim();
            if (!s) return "";
            // If already a data URL, keep it.
            if (s.startsWith("data:image/")) return s;
            // Otherwise assume base64 jpeg
            return `data:image/jpeg;base64,${s}`;
        }

        function setDefectPhoto(imageData) {
            const img = document.getElementById("defectPhoto");
            const hint = document.getElementById("defectPhotoHint");
            const src = normalizeImageSrc(imageData);
            if (!src) {
                img.removeAttribute("src");
                img.style.display = "none";
                hint.textContent = "No photo saved for this issue.";
                hint.style.display = "block";
                return;
            }
            img.src = src;
            img.style.display = "block";
            hint.style.display = "none";
        }

        function buildTitle(insp) {
            const model = safeText(insp.vehicleModel, "");
            const plate = safeText(insp.plateNo, "");
            const joined = [model, plate].filter(Boolean).join(" · ");
            return joined || `Inspection #${insp.inspectionNo}`;
        }

        function renderCards() {
            const list = document.getElementById("cardList");
            list.innerHTML = "";

            const filtered = state.inspections
                .filter(insp => {
                    const iso = toISODate(insp.dateInspected);
                    return state.dateFilter ? iso === state.dateFilter : true;
                })
                .sort((a, b) => {
                    const da = new Date(toISODate(a.dateInspected) || 0).getTime();
                    const db = new Date(toISODate(b.dateInspected) || 0).getTime();
                    return state.sortOrder === "desc" ? (db - da) : (da - db);
                });

            if (!filtered.length) {
                list.innerHTML = `<div style="padding:14px;color:#888;font-weight:600;">No inspection history found.</div>`;
                return;
            }

            filtered.forEach(insp => {
                const tires = insp.tires || [];
                const firstTire = tires[0];
                const pos = firstTire ? safeText(firstTire.tirePosition) : "No findings";
                const iso = toISODate(insp.dateInspected);

                const card = document.createElement("div");
                card.className = "inspection-card";
                card.dataset.date = iso || "";
                card.dataset.id = String(insp.inspectionNo);
                card.innerHTML = `
                    <div class="card-accent"></div>
                    <div class="card-content">
                        <div class="info-group">
                            <i class="fa-regular fa-circle-dot tire-circle"></i>
                            <div class="car-details">
                                <h3>${buildTitle(insp)}</h3>
                                <p>${pos}</p>
                            </div>
                        </div>
                        <div class="action-group">
                            <button class="view-btn" type="button" data-view-id="${insp.inspectionNo}">View</button>
                            <span class="date-label">Date of Inspection</span>
                            <span class="date-value">${formatCardDate(iso)}</span>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });

            // wire view buttons
            list.querySelectorAll("[data-view-id]").forEach(btn => {
                btn.addEventListener("click", () => openDetail(btn.dataset.viewId));
            });
        }

        function openDetail(id) {
            const insp = state.byId.get(String(id));
            if (!insp) return;

            document.querySelector('.bottom-nav').style.display = 'none';

            const tires = insp.tires || [];
            const firstTire = tires[0] || {};

            document.getElementById('detailTitle').textContent = buildTitle(insp);
            document.getElementById('detailDate').textContent = safeText(insp.dateInspected);
            document.getElementById('detailPosition').textContent = safeText(firstTire.tirePosition);
            document.getElementById('detailValidity').textContent = safeText(firstTire.validity);
            document.getElementById('detaildot').textContent = safeText(firstTire.dotCode);
            document.getElementById('detailUser').textContent = safeText(insp.inspector);

            // Status badge
            const status = computeStatus(tires);
            const statusEl = document.getElementById('detailStatus');
            statusEl.textContent = status === 'active' ? 'Active Issue' : 'Resolved';
            statusEl.className = 'detail-status-badge ' + (status === 'active' ? 'badge-active' : 'badge-resolved');

            // Findings
            const findingsEl = document.getElementById('detailFindings');
            if (!tires.length) {
                setDefectPhoto("");
                findingsEl.innerHTML = `
                    <div class="detail-finding safe">
                        <div class="detail-finding-icon"><i class="fas ${iconForDefect('No Damage Detected')}"></i></div>
                        <div>
                            <div class="detail-finding-name">No Damage Detected</div>
                            <div class="detail-finding-desc">No defect records were saved for this inspection.</div>
                        </div>
                        <span class="detail-finding-conf">—</span>
                    </div>
                `;
            } else {
                findingsEl.innerHTML = tires.map(t => {
                    const name = safeText(t.defectType, "Unknown");
                    const type = findingStyle(name);
                    const descParts = [];
                    const pos = safeText(t.tirePosition, "");
                    const dot = safeText(t.dotCode, "");
                    if (pos) descParts.push(pos);
                    if (dot) descParts.push(`DOT ${dot}`);
                    const desc = descParts.length ? descParts.join(" · ") : "Detected defect";
                    return `
                        <div class="detail-finding ${type}" role="button" tabindex="0" data-image="${encodeURIComponent(t.imageData || '')}">
                            <div class="detail-finding-icon"><i class="fas ${iconForDefect(name)}"></i></div>
                            <div>
                                <div class="detail-finding-name">${name}</div>
                                <div class="detail-finding-desc">${desc}</div>
                            </div>
                            <span class="detail-finding-conf">—</span>
                        </div>
                    `;
                }).join("");

                // Default: show first available image (or hint)
                const firstWithImg = tires.find(t => (t.imageData || "").toString().trim().length);
                setDefectPhoto(firstWithImg ? firstWithImg.imageData : "");
            }

            // Clicking a finding shows its photo
            findingsEl.querySelectorAll(".detail-finding[data-image]").forEach(item => {
                const show = () => {
                    const imgData = decodeURIComponent(item.getAttribute("data-image") || "");
                    setDefectPhoto(imgData);
                };
                item.addEventListener("click", show);
                item.addEventListener("keydown", (e) => {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        show();
                    }
                });
            });

            document.getElementById('detailOverlay').classList.add('open');
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('open');
            document.querySelector('.bottom-nav').style.display = 'flex';
        }

        // Close on backdrop tap
        document.getElementById('detailOverlay').addEventListener('click', function (e) {
            if (e.target === this) closeDetail();
        });

        /* ── Filter ── */
        const dom = {
            filterBtn: document.querySelector('#filterBtn'),
            filterDropdown: document.querySelector('#filterDropdown'),
            applyBtn: document.querySelector('#applyBtn'),
            resetBtn: document.querySelector('#resetBtn'),
            list: document.querySelector('#cardList'),
            cards: () => Array.from(document.querySelectorAll('.inspection-card')),
            sortOrder: document.querySelector('#sortOrder'),
            dateSelect: document.querySelector('#dateSelect')
        };

        const toggleDropdown = () => dom.filterDropdown.classList.toggle('show');
        dom.filterBtn.addEventListener('click', toggleDropdown);

        dom.applyBtn.addEventListener('click', () => {
            state.sortOrder = dom.sortOrder.value;
            state.dateFilter = dom.dateSelect.value || "";
            renderCards();
            toggleDropdown();
        });

        dom.resetBtn.addEventListener('click', () => {
            dom.dateSelect.value = '';
            state.sortOrder = dom.sortOrder.value || "desc";
            state.dateFilter = "";
            renderCards();
            toggleDropdown();
        });

        window.addEventListener('click', (e) => {
            if (!dom.filterBtn.contains(e.target) && !dom.filterDropdown.contains(e.target)) {
                dom.filterDropdown.classList.remove('show');
            }
        });

        /* ── Tab slider ── */
        const tabLinks = document.querySelectorAll('.tab-link');
        const slider = document.querySelector('.tab-slider');

        function moveSlider(el) {
            slider.style.left = el.offsetLeft + 'px';
            slider.style.width = el.offsetWidth + 'px';
        }

        const activeTab = document.querySelector('.tab-link.active');
        if (activeTab) moveSlider(activeTab);

        tabLinks.forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                tabLinks.forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                moveSlider(this);
                const href = this.getAttribute('href');
                setTimeout(() => window.location.href = href, 300);
            });
        });

        window.addEventListener('resize', () => {
            const active = document.querySelector('.tab-link.active');
            if (active) moveSlider(active);
        });

        async function loadHistory() {
            try {
                const res = await fetch(`${API_BASE}/inspection-history`);
                const data = await res.json();
                state.inspections = Array.isArray(data) ? data : [];
                state.byId = new Map(state.inspections.map(i => [String(i.inspectionNo), i]));
                renderCards();
            } catch (e) {
                const list = document.getElementById("cardList");
                list.innerHTML = `<div style="padding:14px;color:#e74c3c;font-weight:700;">Could not load history. Make sure Flask is running.</div>`;
                console.error(e);
            }
        }

        loadHistory();

        fetch('drawer.js')
            .then(res => res.text())
            .then(data => {
                eval(data);
            });
    </script>

</body>

</html>
