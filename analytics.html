<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InTire | Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/analytics.css">
</head>

<body>

    <header class="site-header">
        <button class="menu-toggle"><i class="fas fa-bars"></i></button>
        <div class="header-logo">
            <img src="assets/img/InTire.svg" alt="InTire" class="logo-img pt-3">
        </div>
        <div style="width:36px"></div>
    </header>

    <main class="analytics-container">

        <div class="greeting-row">
            <h1 class="page-title">Analytics</h1>
            <span class="page-subtitle" id="todayDate"></span>
        </div>

        <!-- Period Selector -->
        <div class="period-row">
            <button class="period-btn active" onclick="setPeriod('week', this)">Week</button>
            <button class="period-btn" onclick="setPeriod('month', this)">Month</button>
            <button class="period-btn" onclick="setPeriod('year', this)">Year</button>
        </div>

        <!-- Summary Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-card-icon total">
                    <i class="fas fa-tire"></i>
                </div>
                <div class="stat-card-info">
                    <span class="stat-card-number" id="statTotal">24</span>
                    <span class="stat-card-label">Total Inspections</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon danger">
                    <i class="fas fa-circle-exclamation"></i>
                </div>
                <div class="stat-card-info">
                    <span class="stat-card-number" id="statActive">6</span>
                    <span class="stat-card-label">Active Issues</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon success">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-card-info">
                    <span class="stat-card-number" id="statResolved">18</span>
                    <span class="stat-card-label">Resolved</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon info">
                    <i class="fas fa-gauge-high"></i>
                </div>
                <div class="stat-card-info">
                    <span class="stat-card-number" id="statRate">75%</span>
                    <span class="stat-card-label">Resolution Rate</span>
                </div>
            </div>
        </div>

        <!-- Inspections Bar Chart -->
        <div class="analytics-card">
            <div class="analytics-card-header">
                <span class="analytics-card-title">Inspections Over Time</span>
                <span class="analytics-card-sub" id="chartLabel">This Week</span>
            </div>
            <div class="bar-chart" id="barChart"></div>
            <div class="bar-labels" id="barLabels"></div>
        </div>

        <!-- Issue Breakdown -->
        <div class="analytics-card">
            <div class="analytics-card-header">
                <span class="analytics-card-title">Issue Breakdown</span>
            </div>
            <div class="breakdown-list" id="breakdownList"></div>
        </div>

        <!-- Most Inspected Vehicles -->
        <div class="analytics-card">
            <div class="analytics-card-header">
                <span class="analytics-card-title">Most Inspected Vehicles</span>
            </div>
            <div class="vehicle-list" id="vehicleList"></div>
        </div>

    </main>

    <footer class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='overview.html'"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item" onclick="window.location.href='notifications.html'"><i class="fas fa-bell"></i><span>Notifications</span></button>
        <button class="nav-item active-nav" onclick="window.location.href='analytics.html'"><i class="fas fa-chart-bar"></i><span>Analytics</span></button>
        <button class="nav-item" onclick="window.location.href='more.html'"><i class="fas fa-ellipsis-h"></i><span>More</span></button>
    </footer>

    <script>
        // Date
        const dateEl = document.getElementById('todayDate');
        const now = new Date();
        dateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

        const API_BASE = "http://127.0.0.1:5000";
        const state = { period: "week" };

        function iconFor(name) {
            const map = {
                'Surface Crack': 'fa-icicles',
                'Bulge': 'fa-circle',
                'Worn Tread': 'fa-exclamation-triangle',
                'Puncture Hole': 'fa-circle-dot',
                'Puncture Object': 'fa-thumbtack',
                'No Damage': 'fa-check-circle'
            };
            return map[name] || 'fa-exclamation-circle';
        }

        function colorFor(name) {
            if (name === 'No Damage') return '#27ae60';
            const danger = new Set(['Surface Crack', 'Puncture Hole', 'Puncture Object']);
            const warning = new Set(['Bulge', 'Worn Tread']);
            if (danger.has(name)) return '#e74c3c';
            if (warning.has(name)) return '#f39c12';
            return '#e67e22';
        }

        async function loadAnalytics(period) {
            const res = await fetch(`${API_BASE}/analytics?period=${encodeURIComponent(period)}`);
            return await res.json();
        }

        function renderBreakdown(items) {
            const el = document.getElementById("breakdownList");
            if (!Array.isArray(items) || !items.length) {
                el.innerHTML = `<div style="padding:10px;color:#888;font-weight:600;">No breakdown data.</div>`;
                return;
            }
            const max = Math.max(...items.map(i => i.count || 0), 1);
            el.innerHTML = items.map(i => {
                const name = i.name || "Unknown";
                const count = Number(i.count || 0);
                const pct = Math.round((count / max) * 100);
                const color = colorFor(name);
                const icon = iconFor(name);
                return `
                    <div class="breakdown-item">
                        <div class="breakdown-label-row">
                            <span class="breakdown-name"><i class="fas ${icon}" style="${name === 'No Damage' ? 'color:#27ae60' : ''}"></i> ${name}</span>
                            <span class="breakdown-count">${count}</span>
                        </div>
                        <div class="breakdown-bar-track">
                            <div class="breakdown-bar" style="width:${pct}%; background:${color};"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderVehicles(items) {
            const el = document.getElementById("vehicleList");
            if (!Array.isArray(items) || !items.length) {
                el.innerHTML = `<div style="padding:10px;color:#888;font-weight:600;">No vehicles yet.</div>`;
                return;
            }
            const max = Math.max(...items.map(i => i.count || 0), 1);
            el.innerHTML = items.map((i, idx) => {
                const name = i.name || `Vehicle ${idx + 1}`;
                const count = Number(i.count || 0);
                const pct = Math.round((count / max) * 100);
                return `
                    <div class="vehicle-item">
                        <div class="vehicle-rank">${idx + 1}</div>
                        <div class="vehicle-info">
                            <span class="vehicle-name">${name}</span>
                            <span class="vehicle-count">${count} inspection${count === 1 ? '' : 's'}</span>
                        </div>
                        <div class="vehicle-bar-wrap">
                            <div class="vehicle-bar" style="width:${pct}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setPeriod(period, btn) {
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.period = period;
            refresh();
        }

        function renderChart(bars, labels) {
            const max = Math.max(...bars);
            const barChart = document.getElementById('barChart');
            const barLabels = document.getElementById('barLabels');

            barChart.innerHTML = bars.map((val, i) => {
                const h = Math.round((val / max) * 100);
                return `<div class="bar-col">
                    <span class="bar-value">${val}</span>
                    <div class="bar-fill" style="height:${h}%"></div>
                </div>`;
            }).join('');

            barLabels.innerHTML = labels.map(l =>
                `<span class="bar-label-text">${l}</span>`
            ).join('');
        }

        async function refresh() {
            try {
                const d = await loadAnalytics(state.period);
                document.getElementById('chartLabel').textContent = d.label || '';
                document.getElementById('statTotal').textContent = d?.stats?.total ?? 0;
                document.getElementById('statActive').textContent = d?.stats?.active ?? 0;
                document.getElementById('statResolved').textContent = d?.stats?.resolved ?? 0;
                document.getElementById('statRate').textContent = d?.stats?.rate ?? '0%';
                renderChart(d.bars || [], d.barLabels || []);
                renderBreakdown(d.breakdown || []);
                renderVehicles(d.vehicles || []);
            } catch (e) {
                console.error(e);
            }
        }

        // Init (Week)
        refresh();
        
        fetch('drawer.js')
            .then(res => res.text())
            .then(data => {
                eval(data);
            });
    </script>

</body>

</html>
