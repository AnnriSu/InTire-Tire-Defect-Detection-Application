<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assets\style.css">
</head>

<body>
    <div class="text-center mt-5 pt-5">
        <img src="assets/img/InTire.svg" alt="InTire" class="img-fluid pb-2">

        <p class="text-center hero-subtitle">Tire defect inspection using Deep Learning and<br>
        CNN-Powered Image Detection</p>
    </div>

    <hr class="divider">

    <div class="get-started">
        <p class="text-center mb-2 get-started-title">Get Started</p>
        <p class="text-center mb-4 get-started-subtitle">Choose your access method</p>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col px-5 pt-2">
                <a href="signIn.html" class="btn btn-lg w-100 mb-3 btn-signin">Sign In</a>

                <a href="signUp.html" class="btn btn-outline-primary btn-lg w-100 btn-signup">Sign Up</a>

                <p class="text-center m-3 or-separator">Or</p>

                <button class="btn btn-outline-primary btn-lg w-100 btn-guest">Continue as Guest</button>

                <div class="mt-5 py-3 px-4 agreement-box">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="check1">
                        <label class="form-check-label" for="check1">
                            I agree to the <a href="termsAndConditions.html" class="agreement-link">Terms and Conditions</a>
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="check2">
                        <label class="form-check-label" for="check2">
                            I agree to the <a href="privacyPolicy.html" class="agreement-link">Privacy Policy</a>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <hr class="divider">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
