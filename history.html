<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InTire | Inspection History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding-bottom: 120px;
        }

        .site-header {
            background: #fff;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .logo-img {
            height: 35px;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: #f39c12;
            font-size: 20px;
            cursor: pointer;
        }

        .main-nav {
            display: flex;
            background: #eee;
            padding: 5px;
            border-radius: 30px;
        }

        .nav-link {
            text-decoration: none;
            color: #666;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 13px;
            transition: 0.3s;
        }

        .nav-link.active {
            background: #444;
            color: #fff;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
            justify-content: flex-end;
        }

        .search-box {
            background: #f0f0f0;
            padding: 6px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            width: 150px;
        }

        .user-profile {
            font-size: 24px;
            color: #ccc;
        }

        .dashboard-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .page-title p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .web-card {
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .web-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            border-color: #f39c12;
        }

        .card-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 0 0 300px;
        }

        .gear-icon {
            color: #f39c12;
            font-size: 18px;
        }

        .card-info h3 {
            font-size: 14px;
            margin: 0;
        }

        .sub {
            font-size: 12px;
            color: #888;
        }

        .card-status {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .pill {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: bold;
            color: #555;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .red .dot {
            background: #ff4d4d;
        }

        .yellow .dot {
            background: #f1c40f;
        }

        .green .dot {
            background: #2ecc71;
        }

        .orange .dot {
            background: #e67e22;
        }

        .card-action {
            flex: 0 0 50px;
            display: flex;
            justify-content: flex-end;
        }

        .graph-icon {
            font-size: 20px;
            color: #444;
        }

        .bottom-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            background-color: #f39c12;
            height: 75px;
            border-radius: 40px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 0 10px;
        }

        .nav-item {
            background: none;
            border: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            width: 85px;
            height: 60px;
            border-radius: 20px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
            transition: transform 0.3s ease;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .nav-item:hover i {
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {

            .main-nav,
            .header-right {
                display: none;
            }

            .card-info {
                flex: 1;
            }

            .card-status {
                justify-content: flex-end;
            }

            .bottom-nav {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <header class="site-header">
        <div class="header-left">
            <button class="menu-toggle"><i class="fas fa-bars"></i></button>
            <img src="images/Blue and Red Car Tire Parts Business Logo 2.svg" alt="InTire Logo" class="logo-img">
        </div>

        <nav class="main-nav">
            <a href="overview.html" class="nav-link">Overview</a>
            <a href="history.html" class="nav-link active">History</a>
            <a href="tutorial.html" class="nav-link">Tutorial</a>
            <a href="recommendations.html" class="nav-link">Recommendations</a>
        </nav>

        <div class="header-right">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search...">
            </div>
            <div class="user-profile"><i class="fas fa-user-circle"></i></div>
        </div>
    </header>

    <main class="dashboard-container">
        <div class="page-title">
            <h1>Inspection History</h1>
        </div>

        <section class="list-wrapper">
            <div class="web-card">
                <div class="card-info">
                    <i class="fa-solid fa-gear gear-icon"></i>
                    <div>
                        <h3>Toyota Corolla UHA 198</h3>
                        <span class="sub">Front Right</span>
                    </div>
                </div>
                <div class="card-status">
                    <div class="pill red"><span class="dot"></span> Action Required!</div>
                </div>
                <div class="card-action"></div>
            </div>

            <div class="web-card">
                <div class="card-info">
                    <i class="fa-solid fa-gear gear-icon"></i>
                    <div>
                        <h3>Toyota Corolla UHA 198</h3>
                        <span class="sub">Front Right</span>
                    </div>
                </div>
                <div class="card-status">
                    <div class="pill yellow"><span class="dot"></span> Monitoring Required</div>
                </div>
                <div class="card-action"><i class="fas fa-chart-line graph-icon"></i></div>
            </div>

            <div class="web-card">
                <div class="card-info">
                    <i class="fa-solid fa-gear gear-icon"></i>
                    <div>
                        <h3>Toyota Corolla UHA 198</h3>
                        <span class="sub">Front Right</span>
                    </div>
                </div>
                <div class="card-status">
                    <div class="pill green"><span class="dot"></span> Good Condition</div>
                </div>
                <div class="card-action"><i class="fas fa-chart-line graph-icon"></i></div>
            </div>

            <div class="web-card">
                <div class="card-info">
                    <i class="fa-solid fa-gear gear-icon"></i>
                    <div>
                        <h3>Toyota Corolla UHA 198</h3>
                        <span class="sub">Front Right</span>
                    </div>
                </div>
                <div class="card-status">
                    <div class="pill orange"><span class="dot"></span> Overdue!</div>
                </div>
                <div class="card-action"><i class="fas fa-chart-line graph-icon"></i></div>
            </div>
        </section>
    </main>

    <footer class="bottom-nav">
        <button class="nav-item"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item"><i class="fas fa-bell"></i><span>Notifications</span></button>
        <button class="nav-item"><i class="fas fa-chart-bar"></i><span>Analytics</span></button>
        <button class="nav-item"><i class="fas fa-ellipsis-h"></i><span>More</span></button>
    </footer>

</body>

</html>
