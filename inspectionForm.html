<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InTire | Inspection Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/inspectionForm.css">
</head>

<body>

    <header class="site-header">
        <button onclick="window.history.back()" class="menu-toggle">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="header-logo">
            <img src="assets/img/InTire.svg" alt="InTire" class="logo-img pt-3">
        </div>
        <div style="width:36px"></div>
    </header>

    <main class="form-container">

        <div class="form-hero">
            <div class="form-hero-icon">
                <i class="fas fa-clipboard-list"></i>
            </div>
            <div>
                <h1 class="form-title">Inspection Form</h1>
                <p class="form-subtitle">Fill in the details before scanning</p>
            </div>
        </div>

        <!-- Vehicle Info -->
        <div class="form-section-card">
            <p class="form-section-label">
                <i class="fas fa-car"></i> Vehicle Information
            </p>

            <div class="form-group">
                <label class="form-label" for="plateNumber">Plate Number <span class="required">*</span></label>
                <div class="input-wrap">
                    <i class="fas fa-id-card input-icon"></i>
                    <input type="text" id="plateNumber" class="form-input" placeholder="e.g. ABC 1234" maxlength="10">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="carType">Type of Vehicle <span class="required">*</span></label>
                <div class="input-wrap">
                    <i class="fas fa-car-side input-icon"></i>
                    <select id="carType" class="form-input form-select">
                        <option value="" disabled selected>Select vehicle type</option>
                        <option>Sedan</option>
                        <option>SUV</option>
                        <option>Pickup Truck</option>
                        <option>Van</option>
                        <option>Motorcycle</option>
                        <option>Bus</option>
                        <option>Truck</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="vehicleModel">Specific Vehicle Model <span
                        class="required">*</span></label>
                <div class="input-wrap">
                    <i class="fas fa-id-card input-icon"></i>
                    <input type="text" id="vehicleModel" class="form-input" placeholder="e.g. Toyota Camry"
                        maxlength="100">
                </div>
            </div>
        </div>

        <!-- Tire Info -->
        <div class="form-section-card">
            <p class="form-section-label">
                <i class="fas fa-tire"></i> Tire Details
            </p>

            <div class="form-group">
                <label class="form-label">Tire Position <span class="required">*</span></label>
                <div class="tire-grid">
                    <button type="button" class="tire-btn" data-value="Front Left" onclick="selectTire(this)">
                        <i class="fas fa-circle-dot"></i>
                        <span>Front Left</span>
                    </button>
                    <button type="button" class="tire-btn" data-value="Front Right" onclick="selectTire(this)">
                        <i class="fas fa-circle-dot"></i>
                        <span>Front Right</span>
                    </button>
                    <button type="button" class="tire-btn" data-value="Rear Left" onclick="selectTire(this)">
                        <i class="fas fa-circle-dot"></i>
                        <span>Rear Left</span>
                    </button>
                    <button type="button" class="tire-btn" data-value="Rear Right" onclick="selectTire(this)">
                        <i class="fas fa-circle-dot"></i>
                        <span>Rear Right</span>
                    </button>
                    <button type="button" class="tire-btn spare" data-value="Spare" onclick="selectTire(this)">
                        <i class="fas fa-circle-dot"></i>
                        <span>Spare</span>
                    </button>
                </div>
                <input type="hidden" id="tirePosition">
            </div>

            <div class="form-group">
                <label class="form-label" for="tireExpiryDate">
                    Tire DOT Code <span class="required">*</span>
                </label>
                <div class="input-wrap">
                    <i class="fas fa-calendar input-icon"></i>
                    <input type="text" id="tireExpiryDate" class="form-input" maxlength="4" inputmode="numeric"
                        placeholder="e.g. 2616" autocomplete="off">
                </div>
                <p class="form-hint">Enter the 4-digit DOT code from the tire sidewall (week + year, e.g. 2616 = week 26
                    of 2016)</p>
                <div id="tireDotResult"></div>
            </div>
        </div>

        <!-- Inspector Info -->
        <div class="form-section-card">
            <p class="form-section-label">
                <i class="fas fa-user-check"></i> Inspector Details
            </p>

            <div class="form-group">
                <label class="form-label" for="inspectedBy">Inspected By <span class="required">*</span></label>
                <div class="input-wrap">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="inspectedBy" class="form-input" placeholder="Full name">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="inspectionDate">Date of Inspection <span
                        class="required">*</span></label>
                <div class="input-wrap">
                    <i class="fas fa-calendar input-icon"></i>
                    <input type="date" id="inspectionDate" class="form-input">
                </div>
            </div>
        </div>

        <!-- Error message -->
        <div class="form-error hidden" id="formError">
            <i class="fas fa-circle-exclamation"></i>
            <span id="formErrorText">Please fill in all required fields.</span>
        </div>

        <!-- Submit -->
        <button class="form-submit-btn" onclick="submitForm()">
            <i class="fas fa-camera"></i> Start Inspection
        </button>

    </main>

    <script>
        // Set today's date as default
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('inspectionDate').value = today;

        // Tire position selector
        function selectTire(btn) {
            document.querySelectorAll('.tire-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('tirePosition').value = btn.dataset.value;
        }

        // Validate and proceed
        function showError(msg) {
            const errorEl = document.getElementById('formError');
            const errorTxt = document.getElementById('formErrorText');
            errorTxt.textContent = msg;
            errorEl.classList.remove('hidden');
        }

        function submitForm() {
            const plate = document.getElementById('plateNumber').value.trim();
            const carType = document.getElementById('carType').value;
            const model = document.getElementById('vehicleModel').value.trim();
            const position = document.getElementById('tirePosition').value;
            const inspector = document.getElementById('inspectedBy').value.trim();
            const date = document.getElementById('inspectionDate').value;
            const dotCode = document.getElementById('tireExpiryDate').value.trim();

            const errorEl = document.getElementById('formError');

            if (!plate) { showError('Please enter the plate number.'); return; }
            if (!carType) { showError('Please select a vehicle type.'); return; }
            if (!model) { showError('Please enter the vehicle model.'); return; }
            if (!position) { showError('Please select a tire position.'); return; }
            if (!dotCode) { showError('Please enter the tire DOT code.'); return; }
            if (!inspector) { showError('Please enter the inspector\'s name.'); return; }
            if (!date) { showError('Please select a date of inspection.'); return; }

            errorEl.classList.add('hidden');

            sessionStorage.setItem('inspectionData', JSON.stringify({
                plateNumber: plate,
                carType,
                vehicleModel: model,
                tirePosition: position,
                inspectedBy: inspector,
                date,
                dotCode
            }));

            window.location.href = 'inspection.html'; // ✅ was missing
        }

        function showError(msg) {
            const errorEl = document.getElementById('formError');
            document.getElementById('formErrorText').textContent = msg;
            errorEl.classList.remove('hidden');
            errorEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
    <script>document.getElementById('tireExpiryDate').addEventListener('input', function () {
            const raw = this.value.replace(/\D/g, '');
            this.value = raw;
            if (raw.length === 4) calculateTireDot(raw);
            else document.getElementById('tireDotResult').innerHTML = '';
        });

        function calculateTireDot(code) {
            const resultEl = document.getElementById('tireDotResult');

            const week = parseInt(code.slice(0, 2), 10);
            const yr2 = parseInt(code.slice(2, 4), 10);
            const year = yr2 + 2000;

            if (week < 1 || week > 53) {
                resultEl.innerHTML = '<p class="dot-error">Invalid week number. Must be 01–53.</p>';
                return;
            }

            const madeDate = weekToDate(week, year);
            const expiryDate = new Date(madeDate);
            expiryDate.setFullYear(expiryDate.getFullYear() + 5);

            const now = new Date();
            const expired = now > expiryDate;
            const ageDays = Math.floor((now - madeDate) / 86400000);
            const ageYears = (ageDays / 365.25).toFixed(1);
            const daysLeft = Math.floor((expiryDate - now) / 86400000);
            const daysAgo = Math.floor((now - expiryDate) / 86400000);

            const makeStr = madeDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            const expiryStr = expiryDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            let statusClass, statusText;
            if (expired) {
                statusClass = 'dot-expired';
                statusText = `Expired ${daysAgo.toLocaleString()} days ago`;
            } else if (daysLeft < 180) {
                statusClass = 'dot-warning';
                statusText = `Expiring soon — ${daysLeft} days left`;
            } else {
                statusClass = 'dot-valid';
                statusText = `Valid — ${daysLeft.toLocaleString()} days remaining`;
            }

            resultEl.innerHTML = `
        <div class="dot-result ${statusClass}">
            <p class="dot-status">${statusText}</p>
            <ul class="dot-details">
                <li><span>Week manufactured</span><strong>Week ${week}</strong></li>
                <li><span>Year manufactured</span><strong>${year}</strong></li>
                <li><span>Manufacture date</span><strong>${makeStr}</strong></li>
                <li><span>Expiry date</span><strong>${expiryStr}</strong></li>
                <li><span>Tire age</span><strong>${ageYears} years (${ageDays.toLocaleString()} days)</strong></li>
                <li><span>5-year validity</span><strong>${expired ? 'Exceeded' : 'Within limit'}</strong></li>
            </ul>
        </div>`;
        }

        function weekToDate(week, year) {
            const jan4 = new Date(year, 0, 4);
            const startOfWeek1 = new Date(jan4);
            startOfWeek1.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
            const d = new Date(startOfWeek1);
            d.setDate(d.getDate() + (week - 1) * 7);
            return d;
        }</script>

</body>

</html>
